name: SEO Automation

on:
  schedule:
    # Run every 15 minutes to check for scheduled tasks
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run automation script
        run: npm run automation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      
      - name: Handle errors
        if: failure()
        run: |
          echo "::error::SEO automation failed. Check the logs for details."
          
      - name: Update automation status
        if: always()
        run: |
          npm run update-automation-status -- --status="${{ job.status }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }} 